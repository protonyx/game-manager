<ng-container
  *ngrxLet="{
    game: game$,
    currentPlayer: currentPlayer$,
    trackers: trackers$,
    players: players$,
    isHost: isHost$,
    isObserver: isObserver$,
    takenColors: takenColors$,
    isMyTurn: isMyTurn$,
    currentTurnPlayer: currentTurnPlayer$,
    nextTurnPlayer: nextTurnPlayer$
  } as vm">
  <div class="game-page-container">

    <!-- ── Lobby (Preparing state) ── -->
    <ng-container *ngIf="vm.game?.state === 'Preparing'">
      <app-host-lobby
        *ngIf="vm.isHost"
        [game]="vm.game"
        [players]="vm.players"
        [currentPlayer]="vm.currentPlayer!"
        (startGame)="onStartGame(vm.game)"
        (editPlayer)="onPlayerEdit($event)">
      </app-host-lobby>

      <app-player-waiting
        *ngIf="!vm.isHost && !vm.isObserver"
        [game]="vm.game"
        [currentPlayer]="vm.currentPlayer!"
        [takenColors]="vm.takenColors"
        (readyToggled)="onReadyToggled(vm.currentPlayer!, $event)"
        (playerPatched)="onPlayerPatched($event)">
      </app-player-waiting>

      <app-observer-waiting
        *ngIf="vm.isObserver">
      </app-observer-waiting>
    </ng-container>

    <!-- ── Active game (InProgress) ── -->
    <ng-container *ngIf="vm.game?.state === 'InProgress'">

      <!-- MY TURN LAYOUT -->
      <ng-container *ngIf="vm.isMyTurn">
        <div class="my-turn-layout">

          <!-- Pinned top: "Your Turn" header strip -->
          <div class="mt-header">
            <app-current-turn
              *ngIf="vm.currentPlayer"
              [game]="vm.game"
              [players]="vm.players"
              [currentPlayer]="vm.currentPlayer">
            </app-current-turn>
            <button mat-icon-button class="mt-leave-btn" type="button" (click)="onLeaveGame()" aria-label="Leave game">
              <mat-icon>logout</mat-icon>
            </button>
          </div>

          <!-- Scrollable middle: tracker cards -->
          <div class="mt-content">
            <app-tracker-list
              *ngIf="vm.trackers && vm.trackers.length > 0 && vm.currentPlayer"
              [trackers]="vm.trackers"
              [player]="vm.currentPlayer"
              (updateTrackers)="onTrackerUpdate(vm.currentPlayer, $event)">
            </app-tracker-list>
          </div>

          <!-- Pinned bottom: End Turn button + Host Controls -->
          <div class="mt-footer">
            <button
              mat-raised-button
              class="end-turn-btn"
              type="button"
              [style.background-color]="vm.currentPlayer?.color ?? null"
              [style.color]="'white'"
              (click)="onEndTurn(vm.game)">
              End Turn
            </button>
            <button
              *ngIf="vm.isHost"
              mat-mini-fab
              color="primary"
              type="button"
              class="host-settings-btn"
              (click)="fabOpen = !fabOpen"
              aria-label="Host controls">
              <mat-icon>{{ fabOpen ? 'close' : 'settings' }}</mat-icon>
            </button>
          </div>

          <!-- Host controls menu overlay -->
          <ng-container *ngIf="vm.isHost && fabOpen">
            <div class="host-menu-backdrop" (click)="fabOpen = false"></div>
            <div class="host-menu">
              <button mat-raised-button color="warn" type="button"
                (click)="onEndGame(vm.game); fabOpen = false">
                <mat-icon>stop</mat-icon>
                End Game
              </button>
            </div>
          </ng-container>

        </div>
      </ng-container>

      <!-- BETWEEN TURNS LAYOUT -->
      <ng-container *ngIf="!vm.isMyTurn">
        <div class="between-turns-layout">

          <!-- Pinned top: current player header -->
          <div class="bt-header" [style.--player-color]="vm.currentTurnPlayer?.color ?? '#888888'">
            <div class="bt-player-stripe"></div>
            <div class="bt-header-content">
              <div class="bt-player-avatar" [style.background-color]="vm.currentTurnPlayer?.color">
                {{ vm.currentTurnPlayer?.order }}
              </div>
              <div class="bt-player-info">
                <span class="bt-player-name">{{ vm.currentTurnPlayer?.name }}</span>
                <span class="bt-turn-label">Current Turn</span>
              </div>
              <app-turn-timer
                *ngIf="vm.game?.lastTurnStartTime"
                [startTime]="vm.game!.lastTurnStartTime"
                class="bt-timer">
              </app-turn-timer>
              <span class="bt-entry-code" *ngIf="vm.game?.entryCode && vm.isHost">Entry Code: {{ vm.game?.entryCode }}</span>
              <button mat-icon-button class="bt-leave-btn" type="button" (click)="onLeaveGame()" aria-label="Leave game">
                <mat-icon>logout</mat-icon>
              </button>
            </div>
          </div>

          <!-- Scrollable middle: compact player list -->
          <div class="bt-content">
            <app-player-list
              [compactMode]="true"
              [game]="vm.game"
              [players]="vm.players"
              [currentPlayer]="vm.currentPlayer!"
              [isHost]="vm.isHost"
              (editPlayer)="onPlayerEdit($event)"
              (kickPlayer)="onPlayerKick($event)"
              (reorder)="onReorder()"
              (editTracker)="onEditTracker($event)">
            </app-player-list>
          </div>

          <!-- Pinned bottom: Up Next footer -->
          <div class="bt-footer">
            <span class="up-next-label">Up Next</span>
            <div class="up-next-player" [style.background-color]="vm.nextTurnPlayer?.color">
              {{ vm.nextTurnPlayer?.order }}
            </div>
            <span class="up-next-name">{{ vm.nextTurnPlayer?.name }}</span>
          </div>

          <!-- FAB: Host controls (floating above footer) -->
          <ng-container *ngIf="vm.isHost">
            <div class="host-fab-container" [class.open]="fabOpen">
              @if (fabOpen) {
                <div class="fab-actions">
                  <button mat-fab extended color="warn" type="button"
                    (click)="onEndGame(vm.game); fabOpen = false">
                    <mat-icon>stop</mat-icon>
                    End Game
                  </button>
                  <button mat-fab extended color="primary" type="button"
                    (click)="onEndTurn(vm.game); fabOpen = false">
                    <mat-icon>skip_next</mat-icon>
                    Advance Turn
                  </button>
                </div>
              }
              <button mat-fab color="primary" type="button" class="main-fab"
                (click)="fabOpen = !fabOpen">
                <mat-icon>{{ fabOpen ? 'close' : 'settings' }}</mat-icon>
              </button>
            </div>
          </ng-container>

        </div>
      </ng-container>

    </ng-container>

    <!-- ── Complete state ── -->
    <ng-container *ngIf="vm.game?.state === 'Complete'">
      <div class="game-complete">
        <div class="game-complete-header">
          <mat-icon class="complete-icon">emoji_events</mat-icon>
          <h2>Game Complete</h2>
        </div>
        <app-player-list
          [game]="vm.game"
          [players]="vm.players"
          [currentPlayer]="vm.currentPlayer!"
          [isHost]="vm.isHost"
          (editPlayer)="onPlayerEdit($event)"
          (kickPlayer)="onPlayerKick($event)"
          (reorder)="onReorder()"
          (editTracker)="onEditTracker($event)">
        </app-player-list>
        <div class="game-complete-actions" *ngIf="vm.isHost">
          <button mat-raised-button color="warn" (click)="onEndGame(vm.game)">
            End Game
          </button>
        </div>
      </div>
    </ng-container>

  </div>
</ng-container>
