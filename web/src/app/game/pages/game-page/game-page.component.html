<ng-container
  *ngrxLet="{
    game: game$,
    currentPlayer: currentPlayer$,
    trackers: trackers$,
    players: players$,
    isHost: isHost$,
    takenColors: takenColors$,
    cols: cols$,
    leftColSpan: leftColSpan$,
    rightColSpan: rightColSpan$
  } as vm">
  <div class="game-page-container">

    <!-- ── Lobby (Preparing state) ── -->
    <ng-container *ngIf="vm.game?.state === 'Preparing'">
      <app-host-lobby
        *ngIf="vm.isHost"
        [game]="vm.game"
        [players]="vm.players"
        [currentPlayer]="vm.currentPlayer!"
        (startGame)="onStartGame(vm.game)"
        (editPlayer)="onPlayerEdit($event)">
      </app-host-lobby>

      <app-player-waiting
        *ngIf="!vm.isHost"
        [game]="vm.game"
        [currentPlayer]="vm.currentPlayer!"
        [takenColors]="vm.takenColors"
        (readyToggled)="onReadyToggled(vm.currentPlayer!, $event)"
        (playerPatched)="onPlayerPatched($event)">
      </app-player-waiting>
    </ng-container>

    <!-- ── Active game (InProgress / Complete) ── -->
    <ng-container *ngIf="vm.game?.state !== 'Preparing'">
      <!-- Single column: show top controls and bottom tabs -->
      <ng-container *ngIf="isSingleColumn$ | async; else twoColumnLayout">
        <!-- Host controls at the top -->
        <app-game-control
          *ngIf="isHost$ | async"
          class="game-control-card"
          [game]="vm.game"
          [isHost]="isHost$ | async"
          (startGame)="onStartGame(vm.game)"
          (advanceTurn)="onEndTurn(vm.game)"
          (endGame)="onEndGame(vm.game)">
        </app-game-control>

        <!-- Content area switches by selectedTab; tabs fixed at viewport bottom -->
        <div class="single-column-content">
          <ng-container [ngSwitch]="selectedTab">
            <!-- Player List tab content -->
            <ng-container *ngSwitchCase="0">
              <app-player-list
                [game]="vm.game"
                [players]="vm.players"
                [currentPlayer]="vm.currentPlayer!"
                [isHost]="isHost$ | async"
                (editPlayer)="onPlayerEdit($event)"
                (kickPlayer)="onPlayerKick($event)"
                (reorder)="onReorder()"
                (editTracker)="onEditTracker($event)">
              </app-player-list>
            </ng-container>

            <!-- Turn tab content -->
            <ng-container *ngSwitchCase="1">
              <app-current-turn
                *ngIf="vm.game && vm.game.state === 'InProgress' && vm.currentPlayer"
                [game]="vm.game"
                [players]="vm.players"
                [currentPlayer]="vm.currentPlayer"
                [isHost]="isHost$ | async"
                (endTurn)="onEndTurn(vm.game)">
              </app-current-turn>
              <app-tracker-list
                *ngIf="vm.game?.state === 'InProgress' && vm.trackers && vm.trackers.length > 0 && vm.currentPlayer"
                [trackers]="vm.trackers"
                [player]="vm.currentPlayer"
                (updateTrackers)="onTrackerUpdate(vm.currentPlayer, $event)">
              </app-tracker-list>
            </ng-container>
          </ng-container>
        </div>

        <!-- Fixed bottom tabs navigation using Angular Material TabGroup (header only) -->
        <div class="bottom-tabs">
          <mat-tab-group
            headerPosition="below"
            [selectedIndex]="selectedTab"
            (selectedIndexChange)="selectedTab = $event">
            <mat-tab>
              <ng-template mat-tab-label>
                <mat-icon aria-hidden="true">group</mat-icon>
                <span>Player List</span>
              </ng-template>
            </mat-tab>
            <mat-tab>
              <ng-template mat-tab-label>
                <mat-icon aria-hidden="true">schedule</mat-icon>
                <span>Turn</span>
              </ng-template>
            </mat-tab>
          </mat-tab-group>
        </div>
      </ng-container>

      <!-- Two column layout (default on medium and larger screens) -->
      <ng-template #twoColumnLayout>
        <div class="game-grid" [ngClass]="{'two-columns': vm.cols === 2}">
          <!-- Left column (players and game control) -->
          <div class="left-column">
            <!-- Game Control (only for host) -->
            <app-game-control
              *ngIf="isHost$ | async" class="game-control-card"
              [game]="vm.game"
              [isHost]="isHost$ | async"
              (startGame)="onStartGame(vm.game)"
              (advanceTurn)="onEndTurn(vm.game)"
              (endGame)="onEndGame(vm.game)">
            </app-game-control>

            <!-- Player List -->
            <app-player-list
              [game]="vm.game"
              [players]="vm.players"
              [currentPlayer]="vm.currentPlayer!"
              [isHost]="isHost$ | async"
              (editPlayer)="onPlayerEdit($event)"
              (kickPlayer)="onPlayerKick($event)"
              (reorder)="onReorder()"
              (editTracker)="onEditTracker($event)">
            </app-player-list>
          </div>

          <!-- Right column (current turn and trackers) -->
          <div class="right-column">
            <!-- Current Turn -->
            @if (vm.game && vm.game.state === 'InProgress' && vm.currentPlayer) {
            <app-current-turn
              [game]="vm.game"
              [players]="vm.players"
              [currentPlayer]="vm.currentPlayer"
              [isHost]="isHost$ | async"
              (endTurn)="onEndTurn(vm.game)">
            </app-current-turn>
            }

            <!-- Trackers -->
            @if (vm.game?.state === 'InProgress' && vm.trackers && vm.trackers.length > 0 && vm.currentPlayer) {
            <app-tracker-list
              [trackers]="vm.trackers"
              [player]="vm.currentPlayer"
              (updateTrackers)="onTrackerUpdate(vm.currentPlayer, $event)">
            </app-tracker-list>
            }
          </div>
        </div>
      </ng-template>
    </ng-container>

  </div>
</ng-container>
