<div class="tracker-controls">
  @if (!keypadActive) {
    <!-- Main controls: [minus | value | plus] in 1fr auto 1fr grid -->
    <div class="main-controls">
      <button class="btn-adjust btn-minus" type="button" (click)="onMinusClick()" aria-label="Decrease value">−</button>
      <span class="tracker-value" [style.color]="playerColor">{{ trackerValueControl.value }}</span>
      <button class="btn-adjust btn-plus" type="button" (click)="onPlusClick()" aria-label="Increase value">+</button>
    </div>

    <!-- Quick adjustment row -->
    <div class="quick-buttons">
      <button mat-stroked-button class="decrease" type="button" (click)="updateTracker(-10)">−10</button>
      <button mat-stroked-button class="decrease" type="button" (click)="updateTracker(-5)">−5</button>
      <button mat-stroked-button class="increase" type="button" (click)="updateTracker(5)">+5</button>
      <button mat-stroked-button class="increase" type="button" (click)="updateTracker(10)">+10</button>
    </div>
  } @else {
    <!-- Keypad: unchanged behavior, updated visuals -->
    <div class="keypad-container">
      <div class="keypad-display">
        <span class="keypad-sign">{{ isAdding ? '+' : '−' }}</span>
        <span class="keypad-input">{{ keypadValue || '0' }}</span>
      </div>
      <div class="keypad-grid">
        <button mat-stroked-button type="button" (click)="onKeypadClick('1')">1</button>
        <button mat-stroked-button type="button" (click)="onKeypadClick('2')">2</button>
        <button mat-stroked-button type="button" (click)="onKeypadClick('3')">3</button>
        <button mat-stroked-button type="button" (click)="onKeypadClick('4')">4</button>
        <button mat-stroked-button type="button" (click)="onKeypadClick('5')">5</button>
        <button mat-stroked-button type="button" (click)="onKeypadClick('6')">6</button>
        <button mat-stroked-button type="button" (click)="onKeypadClick('7')">7</button>
        <button mat-stroked-button type="button" (click)="onKeypadClick('8')">8</button>
        <button mat-stroked-button type="button" (click)="onKeypadClick('9')">9</button>
        <button mat-stroked-button type="button" (click)="onCancel()"><mat-icon>close</mat-icon></button>
        <button mat-stroked-button type="button" (click)="onKeypadClick('0')">0</button>
        <button mat-stroked-button type="button" (click)="onKeypadClick('backspace')"><mat-icon>backspace</mat-icon></button>
      </div>
      <div class="keypad-actions">
        <button mat-raised-button color="primary" type="button" (click)="onSave()" [disabled]="!keypadValue">Save</button>
        <button mat-button type="button" (click)="onCancel()">Cancel</button>
      </div>
    </div>
  }
</div>
