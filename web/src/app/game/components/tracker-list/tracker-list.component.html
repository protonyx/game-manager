<div class="trackers-grid">
  @for (tracker of trackers; track tracker.id) {
    <div class="tracker-card" [style.--player-color]="player?.color ?? '#888888'">
      <div class="tracker-stripe"></div>
      <div class="tracker-name">{{ tracker.name }}</div>
      <app-tracker-editor
        [trackerValue]="player!.trackerValues[tracker.id]"
        [playerColor]="player?.color ?? '#888888'"
        (trackerChange)="onTrackerChange(tracker.id, $event)"
      ></app-tracker-editor>
    </div>
  }
</div>
