<div class="my-turn-header" [style.--player-color]="getPlayerColor(currentTurn)">
  <div class="player-stripe"></div>
  <div class="header-content">
    <span class="your-turn-label">Your Turn</span>
    <div class="timer-display">
      <app-turn-timer
        *ngIf="game && game.lastTurnStartTime"
        [startTime]="game!.lastTurnStartTime">
      </app-turn-timer>
    </div>
  </div>
</div>
