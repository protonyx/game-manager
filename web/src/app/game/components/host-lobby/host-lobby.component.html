<div class="host-lobby">
  <div class="lobby-header">
    <h2 class="lobby-title">Lobby</h2>
    <span class="player-count">{{ playerCount }} player{{ playerCount !== 1 ? 's' : '' }}</span>
  </div>

  <p class="entry-code">
    Entry Code: <strong>{{ game?.entryCode }}</strong>
  </p>

  <div class="player-grid" *ngIf="players && players.length > 0; else noPlayers">
    <div class="player-card-wrapper" *ngFor="let player of players">
      <app-lobby-player-card
        [player]="player"
        [isHost]="player.id === currentPlayer?.id">
      </app-lobby-player-card>
      <button
        mat-icon-button
        class="edit-btn"
        (click)="onEditPlayer(player)"
        [matTooltip]="'Edit ' + player.name"
        aria-label="Edit player">
        <mat-icon>edit</mat-icon>
      </button>
    </div>
  </div>

  <ng-template #noPlayers>
    <p class="no-players">Waiting for players to join…</p>
  </ng-template>

  <div class="action-area">
    <button
      mat-flat-button
      color="primary"
      class="start-btn"
      [disabled]="!allReady"
      (click)="onStartGame()">
      <mat-icon>play_arrow</mat-icon>
      Start Game
    </button>

    <button
      mat-stroked-button
      class="start-anyways-btn"
      (click)="onStartAnyways()">
      Start Anyways
    </button>
  </div>
</div>
